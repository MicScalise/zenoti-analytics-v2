# =============================================================================
# ci.yml — GitHub Actions CI pipeline
# Implements: EP §18, DR-043 (real RSA keys from generate-test-keys.sh)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r exec eslint . --ext .ts,.tsx
      - run: pnpm -r exec tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # DR-043: Generate real RSA keys for CI, never use fabricated ones
      - run: bash scripts/generate-test-keys.sh
      - run: pnpm -r exec jest --passWithNoTests --forceExit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: za
          POSTGRES_PASSWORD: za_test_password
          POSTGRES_DB: za_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # DR-043: Generate real RSA keys for JWT in CI
      - run: bash scripts/generate-test-keys.sh
      - run: pnpm --filter @za/api exec jest tests/integration/ --forceExit
        env:
          DATABASE_URL: postgresql://za:za_test_password@localhost:5432/za_test
          REDIS_URL: redis://localhost:6379

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t za-api:ci .
      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t za-web:ci .
      - name: Build Workers image
        run: docker build -f apps/workers/Dockerfile -t za-workers:ci .
